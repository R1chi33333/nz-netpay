<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>nz-netpay — NZ take-home pay API</title>
<meta name="description" content="NZ take-home pay API: PAYE, ACC levy, KiwiSaver and student loan deductions from official IRD and ACC rates." />
<style>
  :root{
    --bg:#0a0a0b; --bg-2:#111113; --ink:#fafafa; --ink-2:#a1a1aa;
    --border:#27272a; --accent:#0ea5e9;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    background:var(--bg); color:var(--ink);
    font-family:Inter, system-ui, -apple-system, sans-serif;
    min-height:100vh; display:grid; place-items:center;
  }
  main{ text-align:center; padding:24px; }
  .mono{ font-family:'JetBrains Mono', ui-monospace, monospace; }
  .badge{
    display:inline-block; font-size:12px; letter-spacing:.08em;
    color:var(--accent); border:1px solid var(--border); border-radius:6px;
    padding:4px 10px; margin-bottom:16px;
  }
  h1{ font-size:clamp(1.6rem,4vw,2.4rem); font-weight:600; }
  p{ color:var(--ink-2); margin-top:12px; font-size:.95rem; }
  a{ color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
<main>
  <div class="badge mono">UNDER CONSTRUCTION</div>
  <h1>nz-netpay</h1>
  <p>New Zealand take-home pay API — PAYE, ACC, KiwiSaver, student loan.</p>
  <p class="mono"><a href="/healthz">/healthz</a></p>
</main>
</body>
</html>
